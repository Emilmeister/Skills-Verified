name: Skills Verified Security Analyzer
description: Scan an agent-skill repository and emit a policy-free JSON report.

branding:
  icon: shield
  color: blue

inputs:
  source:
    description: Local repository path or Git URL to scan
    required: false
    default: .
  skip:
    description: Comma-separated analyzer names to skip
    required: false
    default: ''
  only:
    description: Comma-separated analyzer names to run exclusively
    required: false
    default: ''
  use-docker:
    description: Build and run the repository Docker image
    required: false
    default: 'false'
  python-version:
    description: Python version used outside Docker
    required: false
    default: '3.11'

outputs:
  report-path:
    description: Absolute path to the JSON scan report
    value: ${{ steps.scan.outputs.report-path }}
  scan-status:
    description: Technical scan status (complete, partial, or failed)
    value: ${{ steps.scan.outputs.scan-status }}
  findings-count:
    description: Number of findings in the report
    value: ${{ steps.scan.outputs.findings-count }}

runs:
  using: composite
  steps:
    - name: Set up Python
      if: inputs.use-docker != 'true'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Skills Verified
      if: inputs.use-docker != 'true'
      shell: bash
      run: python -m pip install "${{ github.action_path }}[scanners]"

    - name: Build Skills Verified image
      if: inputs.use-docker == 'true'
      shell: bash
      run: docker build --tag skills-verified:action "${{ github.action_path }}"

    - name: Scan repository
      id: scan
      shell: bash
      env:
        SV_SOURCE: ${{ inputs.source }}
        SV_SKIP: ${{ inputs.skip }}
        SV_ONLY: ${{ inputs.only }}
        SV_USE_DOCKER: ${{ inputs.use-docker }}
      run: |
        set -euo pipefail

        output_dir="${{ runner.temp }}/skills-verified-output"
        report_path="$output_dir/report.json"
        mkdir -p "$output_dir"

        analyzer_args=()
        if [[ -n "$SV_SKIP" ]]; then
          analyzer_args+=(--skip "$SV_SKIP")
        fi
        if [[ -n "$SV_ONLY" ]]; then
          analyzer_args+=(--only "$SV_ONLY")
        fi

        exit_code=0
        if [[ "$SV_USE_DOCKER" == 'true' ]]; then
          docker_args=(run --rm)
          docker_source="$SV_SOURCE"
          if [[ -e "$SV_SOURCE" ]]; then
            absolute_source="$(realpath "$SV_SOURCE")"
            docker_args+=(--volume "$absolute_source:/scan-source:ro")
            docker_source=/scan-source
          fi
          docker_args+=(skills-verified:action "${analyzer_args[@]}" -- "$docker_source")
          docker "${docker_args[@]}" > "$report_path" || exit_code=$?
        else
          skills-verified "${analyzer_args[@]}" -- "$SV_SOURCE" > "$report_path" || exit_code=$?
        fi

        echo "report-path=$report_path" >> "$GITHUB_OUTPUT"
        if [[ -s "$report_path" ]]; then
          python - "$report_path" "$GITHUB_OUTPUT" <<'PY'
        import json
        import sys

        with open(sys.argv[1], encoding="utf-8") as report_file:
            report = json.load(report_file)
        with open(sys.argv[2], "a", encoding="utf-8") as github_output:
            print(f'scan-status={report["scan"]["status"]}', file=github_output)
            print(f'findings-count={len(report["findings"])}', file=github_output)
        PY
        else
          echo 'scan-status=' >> "$GITHUB_OUTPUT"
          echo 'findings-count=' >> "$GITHUB_OUTPUT"
          if [[ "$exit_code" -eq 0 ]]; then
            echo 'skills-verified produced no JSON report' >&2
            exit_code=2
          fi
        fi

        exit "$exit_code"
