# Include this file, then extend `.skills-verified`.
# Pin SV_INSTALL_SPEC to a release tag or commit in production.

variables:
  SV_INSTALL_SPEC: git+https://github.com/Emilmeister/Skills-Verified.git@main
  SV_SOURCE: .
  SV_SKIP: ''
  SV_ONLY: ''

.skills-verified:
  image: python:3.11
  stage: test
  before_script:
    - python -m pip install "$SV_INSTALL_SPEC" bandit semgrep
  script:
    - |
      python - <<'PY'
      import json
      import os
      import subprocess
      import sys

      command = ["skills-verified"]
      for environment_name, option in (("SV_SKIP", "--skip"), ("SV_ONLY", "--only")):
          value = os.environ.get(environment_name)
          if value:
              command.extend((option, value))
      command.extend(("--", os.environ.get("SV_SOURCE", ".")))

      with open("report.json", "w", encoding="utf-8") as report_file:
          result = subprocess.run(command, stdout=report_file, check=False)

      if not os.path.getsize("report.json"):
          print("skills-verified produced no JSON report", file=sys.stderr)
          sys.exit(result.returncode or 2)

      with open("report.json", encoding="utf-8") as report_file:
          report = json.load(report_file)
      print(json.dumps({
          "status": report["scan"]["status"],
          "findings": len(report["findings"]),
          "analyzer_runs": report["analyzer_runs"],
      }, indent=2))

      sys.exit(result.returncode)
      PY
  artifacts:
    paths: [report.json]
    when: always
