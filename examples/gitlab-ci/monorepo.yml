include:
  - remote: https://raw.githubusercontent.com/Emilmeister/Skills-Verified/main/templates/gitlab-ci-skills-verified.yml

stages: [security]

skill-security-analysis:
  extends: .skills-verified
  stage: security
  parallel:
    matrix:
      - SV_SOURCE:
          - skills/formatter
          - skills/reviewer
          - skills/summarizer
  variables:
    SV_SKIP: llm
  artifacts:
    paths: [report.json]
    when: always
    expire_in: 14 days
