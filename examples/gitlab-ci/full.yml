include:
  - remote: https://raw.githubusercontent.com/Emilmeister/Skills-Verified/main/templates/gitlab-ci-skills-verified.yml

stages: [security]

skill-security-analysis:
  extends: .skills-verified
  stage: security
  variables:
    SV_SOURCE: .
    SV_SKIP: llm
    # Pin a release or commit in production.
    SV_INSTALL_SPEC: git+https://github.com/Emilmeister/Skills-Verified.git@main
  artifacts:
    paths: [report.json]
    when: always
    expire_in: 30 days
