name: Skill security analysis (monorepo)

on: [push, pull_request]

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        skill:
          - path: skills/formatter
            name: formatter
          - path: skills/reviewer
            name: reviewer
    steps:
      - uses: actions/checkout@v4

      - name: Scan ${{ matrix.skill.name }}
        id: scan
        uses: Emilmeister/Skills-Verified@main
        with:
          source: ${{ matrix.skill.path }}
          skip: llm

      - name: Inspect technical report
        if: always() && steps.scan.outputs.report-path != ''
        env:
          REPORT_PATH: ${{ steps.scan.outputs.report-path }}
        run: |
          python - <<'PY'
          import json
          import os

          with open(os.environ["REPORT_PATH"], encoding="utf-8") as report_file:
              report = json.load(report_file)
          print(json.dumps({
              "status": report["scan"]["status"],
              "findings": len(report["findings"]),
              "analyzer_runs": report["analyzer_runs"],
          }, indent=2))
          PY

      - name: Upload ${{ matrix.skill.name }} report
        if: always() && steps.scan.outputs.report-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: skills-verified-${{ matrix.skill.name }}
          path: ${{ steps.scan.outputs.report-path }}
          if-no-files-found: error
