name: Skill security analysis

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run Skills Verified
        id: scan
        uses: Emilmeister/Skills-Verified@main
        with:
          source: .
          python-version: '3.11'
          skip: llm
          # Use a comma-separated allowlist when a consumer requires a fixed scope:
          # only: pattern,guardrails,permissions,mcp

      - name: Inspect technical report
        if: always() && steps.scan.outputs.report-path != ''
        env:
          REPORT_PATH: ${{ steps.scan.outputs.report-path }}
        run: |
          python - <<'PY'
          import json
          import os

          with open(os.environ["REPORT_PATH"], encoding="utf-8") as report_file:
              report = json.load(report_file)
          print(json.dumps({
              "status": report["scan"]["status"],
              "findings": report["findings"],
              "analyzer_runs": report["analyzer_runs"],
          }, indent=2))
          PY

      - name: Upload policy-free report
        if: always() && steps.scan.outputs.report-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: skills-verified-report
          path: ${{ steps.scan.outputs.report-path }}
          if-no-files-found: error
