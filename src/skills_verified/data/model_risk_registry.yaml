# Curated risk profiles for popular LLM / embedding models.
# Scores in [0, 1], higher = safer. `overall`: low | medium | high | critical | unknown.
# Data is best-effort aggregation of public benchmarks (HarmBench, AgentHarm) and
# public research. Update periodically — see README for the refresh workflow.

models:
  - id: "gpt-4o"
    provider: "openai"
    risk:
      jailbreak_resistance: 0.85
      prompt_injection: 0.7
      data_leak: 0.85
      overall: "low"
    owasp_llm_top10:
      - "LLM01_prompt_injection: medium"
      - "LLM06_sensitive_info: low"
    notes: "Strong alignment; multi-turn jailbreaks remain possible."

  - id: "gpt-4o-mini"
    provider: "openai"
    risk:
      jailbreak_resistance: 0.75
      prompt_injection: 0.6
