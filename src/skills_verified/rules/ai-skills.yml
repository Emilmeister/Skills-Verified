rules:
  - id: hardcoded-openai-api-key
    patterns:
      - pattern-regex: "sk-[A-Za-z0-9]{20,}"
    message: >
      Hardcoded OpenAI API key detected. Store API keys in environment
      variables or a secret manager, never in source code.
    severity: ERROR
    languages: [python, javascript, typescript, json, yaml]
    metadata:
      category: security
      cwe: ["CWE-798: Use of Hard-coded Credentials"]
      owasp: ["A07:2021 - Identification and Authentication Failures"]

  - id: hardcoded-anthropic-api-key
    patterns:
      - pattern-regex: "sk-ant-[A-Za-z0-9\\-]{20,}"
    message: >
      Hardcoded Anthropic API key detected. Store API keys in environment
      variables or a secret manager, never in source code.
    severity: ERROR
    languages: [python, javascript, typescript, json, yaml]
    metadata:
      category: security
      cwe: ["CWE-798: Use of Hard-coded Credentials"]

  - id: hardcoded-huggingface-token
    patterns:
      - pattern-regex: "hf_[A-Za-z0-9]{20,}"
    message: >
      Hardcoded Hugging Face token detected. Use environment variables
      or a secret manager instead.
    severity: ERROR
    languages: [python, javascript, typescript, json, yaml]
    metadata:
      category: security
      cwe: ["CWE-798: Use of Hard-coded Credentials"]

  - id: unsafe-yaml-load-skill
    patterns:
      - pattern: yaml.load(...)
      - pattern-not: yaml.load(..., Loader=yaml.SafeLoader)
      - pattern-not: yaml.load(..., Loader=yaml.CSafeLoader)
    message: >
      yaml.load() without SafeLoader can execute arbitrary code during
      deserialization (AST05: Unsafe Deserialization). Use yaml.safe_load()
      or pass Loader=yaml.SafeLoader explicitly.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: ["CWE-502: Deserialization of Untrusted Data"]
      owasp-ast: ["AST05: Unsafe Deserialization"]

  - id: unsafe-pickle-in-skill
    patterns:
      - pattern-either:
          - pattern: pickle.load(...)
          - pattern: pickle.loads(...)
    message: >
      pickle deserialization can execute arbitrary code. This is especially
      dangerous in AI agent skills where input may come from untrusted sources.
      Use JSON or a safe serialization format instead.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: ["CWE-502: Deserialization of Untrusted Data"]
      owasp-ast: ["AST05: Unsafe Deserialization"]

  - id: unvalidated-format-string-in-prompt
    patterns:
      - pattern: |
          f"...$VAR..."
      - metavariable-regex:
          metavariable: $VAR
          regex: "(user_input|prompt|query|message|instruction|request)"
    message: >
      User input is directly interpolated into a prompt string without
      sanitization. This may enable indirect prompt injection attacks.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      owasp-llm: ["LLM01: Prompt Injection"]

  - id: exec-in-skill-handler
    patterns:
      - pattern-either:
          - pattern: exec(...)
          - pattern: eval(...)
          - pattern: compile(..., "exec")
    message: >
      Dynamic code execution in an AI skill handler. An attacker could
      exploit this through prompt injection to execute arbitrary code.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: ["CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code"]
